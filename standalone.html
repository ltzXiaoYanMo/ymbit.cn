<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烟墨的小破站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }

    /* Lucide icons via SVG sprite fallback */
    .icon {
      width: 1em;
      height: 1em;
      display: inline-block;
      vertical-align: -0.125em;
    }
  </style>
</head>
<body class="bg-gray-900">
  <!-- Background Image -->
  <div
    class="fixed inset-0 bg-cover bg-center bg-no-repeat"
    style="background-image: url('https://t.alcy.cc/moez/');"
  >
    <div class="absolute inset-0 bg-black/30"></div>
  </div>

  <!-- Content -->
  <div class="relative max-w-4xl mx-auto px-4 py-12 space-y-16">
    <!-- Hero Section -->
    <section id="hero" class="flex flex-col items-center text-center space-y-6 fade-up delay-1">
      <!-- Avatar -->
      <img
        src="https://avatar.ymbit.cn/"
        alt="烟墨"
        class="w-28 h-28 rounded-full ring-4 ring-white/50 shadow-xl object-cover"
      >

      <div class="space-y-3">
        <h1 class="text-4xl font-bold tracking-tight text-white drop-shadow-lg">
          烟墨的小破站
        </h1>
        <p class="text-lg text-white/90 max-w-lg mx-auto drop-shadow">
          一个热爱技术的开发者，喜欢折腾各种有趣的东西
        </p>
      </div>

      <!-- Hitokoto & Weather -->
      <div class="flex flex-wrap items-center justify-center gap-3">
        <!-- Weather & IP -->
        <a
          id="weather-card"
          href="https://blog.ymbit.cn/otherApi"
          target="_blank"
          rel="noopener noreferrer"
          class="bg-white/20 backdrop-blur-sm rounded-2xl px-5 py-2.5 flex flex-col items-center gap-1 hover:bg-white/30 transition-colors"
          style="display: none;"
        >
          <div class="flex items-center gap-2">
            <svg id="weather-icon" class="w-4 h-4 text-white/80" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            <span id="weather-city" class="text-sm text-white/90"></span>
            <span id="weather-temp" class="text-sm text-white/90"></span>
            <span id="weather-desc" class="text-sm text-white/70"></span>
          </div>
          <div id="ip-row" class="flex items-center gap-2" style="display: none;">
            <svg class="w-4 h-4 text-white/80" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="ip-text" class="text-sm text-white/90"></span>
          </div>
        </a>

        <!-- Hitokoto -->
        <div
          id="hitokoto-card"
          class="bg-white/20 backdrop-blur-sm rounded-2xl px-5 py-2.5 flex flex-col items-center gap-1 cursor-pointer hover:bg-white/30 transition-colors max-w-md"
          style="display: none;"
        >
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-white/80 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21c0 0 0 0 0 0z"></path>
              <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 0 0 0 0 0z"></path>
            </svg>
            <p id="hitokoto-text" class="text-sm text-white/90 truncate"></p>
            <svg class="w-3 h-3 text-white/60 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
              <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
              <path d="M16 21h5v-5"></path>
            </svg>
          </div>
          <p id="hitokoto-from" class="text-xs text-white/60" style="display: none;"></p>
        </div>
      </div>

      <!-- Social Links -->
      <div class="flex items-center gap-3">
        <!-- GitHub -->
        <a
          href="https://github.com/ltzXiaoYanMo"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
          class="p-2 text-white hover:bg-white/20 rounded-lg transition-colors"
        >
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
        <!-- Bilibili -->
        <a
          href="https://space.bilibili.com/542282955"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Bilibili"
          class="p-2 text-white hover:bg-white/20 rounded-lg transition-colors"
        >
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.773s-2.262 1.524-3.773 1.56H5.333c-1.51-.036-2.769-.556-3.773-1.56S.036 18.858 0 17.347v-7.36c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.262-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.151.929.4.267.249.391.551.391.907 0 .355-.124.657-.373.906zM5.333 7.24c-.746.018-1.373.276-1.88.773-.506.498-.769 1.13-.786 1.894v7.52c.017.764.28 1.395.786 1.893.507.498 1.134.756 1.88.773h13.334c.746-.017 1.373-.275 1.88-.773.506-.498.769-1.129.786-1.893v-7.52c-.017-.765-.28-1.396-.786-1.894-.507-.497-1.134-.755-1.88-.773zM8 11.107c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373zm8 0c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373z"/>
          </svg>
        </a>
        <!-- Email -->
        <a
          href="mailto:yanmo@ymbit.cn"
          aria-label="Email"
          class="p-2 text-white hover:bg-white/20 rounded-lg transition-colors"
        >
          <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
        </a>
      </div>
    </section>

    <!-- Personal Links Section -->
    <section id="links" class="space-y-8 fade-up delay-2">
      <div class="text-center space-y-2">
        <h2 class="text-2xl font-bold text-white drop-shadow-lg">
          个人链接
        </h2>
      </div>

      <div class="flex flex-wrap justify-center gap-3">
        <!-- 博客 -->
        <a
          href="https://blog.ymbit.cn/"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 bg-white/20 backdrop-blur-sm rounded-full px-5 py-2.5 hover:bg-white/30 transition-colors mb-5"
        >
          <svg class="w-6 h-6 text-white/90 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>
            <path d="M18 14h-8"></path>
            <path d="M15 18h-5"></path>
            <path d="M10 6h8v4h-8V6Z"></path>
          </svg>
          <span class="text-white/90">博客</span>
        </a>
        <!-- AList -->
        <a
          href="https://alist.ymbit.cn"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 bg-white/20 backdrop-blur-sm rounded-full px-5 py-2.5 hover:bg-white/30 transition-colors mb-5"
        >
          <svg class="w-6 h-6 text-white/90 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
          </svg>
          <span class="text-white/90">AList</span>
        </a>
        <!-- 站点监测 -->
        <a
          href="https://status.ymbit.cn"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 bg-white/20 backdrop-blur-sm rounded-full px-5 py-2.5 hover:bg-white/30 transition-colors mb-5"
        >
          <svg class="w-6 h-6 text-white/90 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 7 17l-5-5"></path>
            <path d="m22 10-9.5 9.5L10 17"></path>
          </svg>
          <span class="text-white/90">站点监测</span>
        </a>
      </div>
    </section>
  </div>

  <script>
    // Entrance animation
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible'));
      }, 100);
    });

    // Weather icon mapping
    function getWeatherIcon(weather) {
      if (weather.includes('晴')) {
        return `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>`;
      }
      if (weather.includes('云') || weather.includes('阴')) {
        return `<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>`;
      }
      if (weather.includes('雨')) {
        return `<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M16 14v6"></path><path d="M8 14v6"></path><path d="M12 16v6"></path>`;
      }
      if (weather.includes('雪')) {
        return `<path d="M2 12h5"></path><path d="M13 17h5"></path><path d="M9 6l3-3 3 3"></path><path d="M9 18l3 3 3-3"></path><line x1="12" y1="2" x2="12" y2="22"></line>`;
      }
      if (weather.includes('雾') || weather.includes('霾')) {
        return `<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M16 14v6"></path><path d="M8 14v6"></path><path d="M12 16v6"></path>`;
      }
      if (weather.includes('风')) {
        return `<path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path><path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path><path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path>`;
      }
      return `<path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M12 6a4 4 0 0 0-4 4c0 1.95 1.4 3.57 3.25 3.93a.5.5 0 0 1 .75.47v.6a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-.57a.5.5 0 0 1 .75-.46A4.002 4.002 0 0 0 18 10a4 4 0 0 0-4-4z"></path>`;
    }

    // Fetch weather
    fetch('https://ymbit.cn/api/weather/today')
      .then(r => r.json())
      .then(data => {
        const card = document.getElementById('weather-card');
        const icon = document.getElementById('weather-icon');
        document.getElementById('weather-city').textContent = data.city;
        document.getElementById('weather-temp').textContent = data.temperature + '°C';
        document.getElementById('weather-desc').textContent = data.weather;
        icon.innerHTML = getWeatherIcon(data.weather);
        card.style.display = '';
      })
      .catch(() => {});

    // Fetch IP
    fetch('https://ymbit.cn/api/ip/location')
      .then(r => r.json())
      .then(data => {
        if (data.query) {
          document.getElementById('ip-text').textContent = data.query;
          document.getElementById('ip-row').style.display = '';
        }
      })
      .catch(() => {});

    // Fetch hitokoto
    function fetchHitokoto() {
      fetch('https://v1.hitokoto.cn/?c=f')
        .then(r => r.json())
        .then(data => {
          const card = document.getElementById('hitokoto-card');
          document.getElementById('hitokoto-text').textContent = data.hitokoto;
          const fromEl = document.getElementById('hitokoto-from');
          if (data.from || data.from_who) {
            const text = data.from_who
              ? `—— ${data.from_who}「${data.from}」`
              : `—— ${data.from}`;
            fromEl.textContent = text;
            fromEl.style.display = '';
          } else {
            fromEl.style.display = 'none';
          }
          card.style.display = '';
        })
        .catch(() => {});
    }
    fetchHitokoto();
    document.getElementById('hitokoto-card').addEventListener('click', fetchHitokoto);
  </script>
</body>
</html>
